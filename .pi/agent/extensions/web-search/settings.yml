use_default_settings: true

general:
  instance_name: "pi-search"

search:
  safe_search: 0
  formats:
    - html
    - json

server:
  limiter: false
  secret_key: "pi-local-search-key"
  bind_address: "0.0.0.0"
  port: 8080

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
