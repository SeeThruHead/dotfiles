<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>pi-remote</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        mono: ["'SF Mono'", "'Fira Code'", "'JetBrains Mono'", "'Cascadia Code'", 'Menlo', 'Monaco', 'monospace'],
      },
      colors: {
        surface: '#16213e',
        deep: '#0f1629',
        border: '#2d2d4a',
      },
    },
  },
};
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes blink { 50% { opacity: 0; } }
  .animate-pulse-dot { animation: pulse-dot 1.5s infinite; }
  .animate-blink { animation: blink 1s step-end infinite; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d2d4a; border-radius: 3px; }
  pre code.hljs { font-family: inherit; }
</style>
</head>
<body class="dark bg-[#1a1a2e] text-gray-200 font-mono text-sm h-screen overflow-hidden">

<div id="app" class="h-screen flex flex-col"></div>
<div id="error-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; z-index:9999; background:#1a1a2e; color:#ff6b6b; font-family:monospace; font-size:12px; padding:16px; overflow:auto; white-space:pre-wrap; word-break:break-all;"></div>

<script>
// ── Page-level debug log — plain DOM, no frameworks, catches EVERYTHING ──
(function() {
  var panel = document.createElement('div');
  panel.id = 'debug-panel';
  panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#000;color:#0f0;font-family:monospace;font-size:10px;padding:8px;max-height:30vh;overflow-y:auto;border-top:2px solid #0f0;white-space:pre-wrap;word-break:break-all;display:none;';
  document.body.appendChild(panel);

  var toggle = document.createElement('button');
  toggle.textContent = '🐛';
  toggle.style.cssText = 'position:fixed;bottom:8px;left:8px;z-index:100000;background:#222;color:#0f0;border:1px solid #0f0;border-radius:4px;width:30px;height:30px;font-size:14px;cursor:pointer;opacity:0.5;';
  toggle.addEventListener('click', function() {
    var vis = panel.style.display === 'none';
    panel.style.display = vis ? 'block' : 'none';
    toggle.style.opacity = vis ? '1' : '0.5';
    if (vis) panel.scrollTop = panel.scrollHeight;
  });
  document.body.appendChild(toggle);

  var lines = [];
  window.__dbg = function(msg) {
    var ts = new Date().toLocaleTimeString();
    lines.push(ts + ' ' + msg);
    if (lines.length > 80) lines.shift();
    panel.textContent = 'DEBUG (' + lines.length + ' lines)\n' + lines.join('\n');
    panel.scrollTop = panel.scrollHeight;
  };

  window.__dbg('debug panel loaded');

  // Catch all errors
  window.addEventListener('error', function(e) {
    window.__dbg('‼️ ERROR: ' + e.message + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?'));
    if (e.error && e.error.stack) window.__dbg('  stack: ' + e.error.stack);
  });

  // Catch unhandled promise rejections
  window.addEventListener('unhandledrejection', function(e) {
    var r = e.reason;
    window.__dbg('‼️ REJECTION: ' + (r instanceof Error ? r.message + '\n' + (r.stack || '') : String(r)));
  });

  // Intercept console.error and console.warn
  var origError = console.error;
  var origWarn = console.warn;
  console.error = function() {
    var args = Array.prototype.slice.call(arguments);
    window.__dbg('console.error: ' + args.map(String).join(' '));
    origError.apply(console, arguments);
  };
  console.warn = function() {
    var args = Array.prototype.slice.call(arguments);
    window.__dbg('console.warn: ' + args.map(String).join(' '));
    origWarn.apply(console, arguments);
  };

  // Also show the error overlay
  var overlay = document.getElementById('error-overlay');
  var tapCount = 0;
  overlay.addEventListener('click', function() {
    tapCount++;
    if (tapCount >= 3) { overlay.style.display = 'none'; tapCount = 0; }
    setTimeout(function() { tapCount = 0; }, 1000);
  });
})();
</script>

<script type="module">
window.__dbg('module: starting imports');
try {
  const { render } = await import("./vendor.js");
  window.__dbg('module: vendor.js loaded');
  const { html } = await import("./html.js");
  window.__dbg('module: html.js loaded');
  const { default: App } = await import("./app.js");
  window.__dbg('module: app.js loaded');
  render(html`<${App} />`, document.getElementById("app"));
  window.__dbg('module: render() called');
} catch (err) {
  window.__dbg('‼️ MODULE LOAD ERROR: ' + err.message + '\n' + (err.stack || ''));
}
</script>

</body>
</html>
