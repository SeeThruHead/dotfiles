---
# Ansible playbook for macOS workstation setup
# Run: ansible-playbook ~/.config/yadm/bootstrap.yml
- name: macOS workstation setup
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    homebrew_casks:
      - 1password
      - amethyst
      - bambu-studio
      - bettertouchtool
      - brave-browser
      - claude
      - codex-app
      - discord
      - drawio
      - dropbox
      - font-source-code-pro
      - ghostty
      - google-chrome
      - karabiner-elements
      - kitty
      - localsend
      - obs
      - orbstack
      - raycast
      - signal
      - soundsource
      - slack
      - stats
      - superwhisper
      - tailscale
      - visual-studio-code
      - vlc

    macos_defaults:
      # Dock
      - { domain: com.apple.dock, key: autohide, type: bool, value: true }
      - { domain: com.apple.dock, key: tilesize, type: int, value: 51 }
      - { domain: com.apple.dock, key: show-recents, type: bool, value: false }
      - { domain: com.apple.dock, key: orientation, type: string, value: left }
      # Spaces
      - { domain: com.apple.dock, key: mru-spaces, type: bool, value: false }
      # Hot corners (top-right: sleep display, bottom-right: quick note)
      - { domain: com.apple.dock, key: wvous-tr-corner, type: int, value: 10 }
      - { domain: com.apple.dock, key: wvous-tr-modifier, type: int, value: 0 }
      - { domain: com.apple.dock, key: wvous-br-corner, type: int, value: 14 }
      - { domain: com.apple.dock, key: wvous-br-modifier, type: int, value: 0 }
      # Keyboard
      - { domain: NSGlobalDomain, key: KeyRepeat, type: int, value: 2 }
      - { domain: NSGlobalDomain, key: InitialKeyRepeat, type: int, value: 15 }
      - { domain: NSGlobalDomain, key: ApplePressAndHoldEnabled, type: bool, value: false }
      - { domain: NSGlobalDomain, key: NSAutomaticCapitalizationEnabled, type: bool, value: false }
      - { domain: NSGlobalDomain, key: NSAutomaticPeriodSubstitutionEnabled, type: bool, value: false }
      - { domain: NSGlobalDomain, key: NSAutomaticSpellingCorrectionEnabled, type: bool, value: false }
      - { domain: NSGlobalDomain, key: NSAutomaticQuoteSubstitutionEnabled, type: bool, value: false }
      - { domain: NSGlobalDomain, key: NSAutomaticDashSubstitutionEnabled, type: bool, value: false }
      # Finder
      - { domain: NSGlobalDomain, key: AppleShowAllExtensions, type: bool, value: true }
      # Mouse
      - { domain: NSGlobalDomain, key: com.apple.mouse.scaling, type: float, value: 0.875 }
      # Screenshots
      - { domain: com.apple.screencapture, key: location, type: string, value: "{{ lookup('env', 'HOME') }}/Screenshots" }
      # Appearance
      - { domain: NSGlobalDomain, key: AppleInterfaceStyle, type: string, value: Dark }
      # Raycast hotkey
      - { domain: com.raycast.macos, key: raycastGlobalHotkey, type: string, value: "Command-49" }



    homebrew_taps:
      - dlvhdr/formulae
      - roborev-dev/tap
      - seethruhead/tap
      - wedow/tools

    homebrew_packages:
      - bash
      - bat
      - bchunk
      - btop
      - chafa
      - cmake
      - cowsay
      - defaultbrowser
      - dlvhdr/formulae/diffnav
      - dockutil
      - duckdb
      - eza
      - fd
      - fzf
      - gh
      - git-delta
      - gitleaks
      - gnupg
      - go
      - grafanactl
      - grep
      - gum
      - htop
      - http-server
      - iperf3
      - jq
      - just
      - logcli
      - lzip
      - mas
      - mprocs
      - nasm
      - neovim
      - ninja
      - openjdk
      - oxker
      - pinentry-mac
      - pipenv
      - pipx
      - python@3.12
      - python@3.13
      - ripgrep
      - rtk
      - rust
      - seethruhead/tap/portkill
      # NOTE: seethruhead/tap/screenorganizer is installed in its own task below
      # because its postinstall step needs App Management TCC permission to copy
      # the .app into /Applications, which the bulk install task can't tolerate.
      - spark
      - speedtest-cli
      - sshpass
      - temporal
      - the_silver_searcher
      - tldr
      - tmux
      - tree
      - tree-sitter
      - ttyd
      - wedow/tools/ticket
      - wget
      - yadm
      - z
      - zellij
      - zig
      - zoxide
      - zsh-autosuggestions
      # Notes: roborev-dev/tap/roborev installed via tap above if needed.
      # Intentionally excluded per user 2026-04-07: groovy-cli (clone source instead),
      # restate/restate-server, openjdk@8, python@3.9.

    # Mac App Store apps (must be "purchased" under signed-in Apple ID)
    mas_apps:
      - { id: 918858936, name: Airmail }
      - { id: 975937182, name: Fantastical }

    # Dock pinned apps, in order. dockutil resets to exactly this list.
    dock_apps:
      - /Applications/Airmail.app
      - /Applications/Google Chrome.app
      - /Applications/Fantastical.app
      - /Applications/Discord.app
      - /Applications/kitty.app
      - /Applications/Slack.app
      - /System/Applications/System Settings.app

  tasks:
    # --- Homebrew ---
    - name: Tap homebrew repos
      community.general.homebrew_tap:
        name: "{{ item }}"
      loop: "{{ homebrew_taps }}"

    - name: Install homebrew packages
      community.general.homebrew:
        name: "{{ homebrew_packages }}"
        state: present

    # screenorganizer's postinstall script copies the .app into /Applications
    # via `rm -rf` + `ditto`. Both are blocked by macOS App Management TCC unless
    # the parent terminal has the permission granted. We install the formula here
    # but tolerate the postinstall failure, then queue a manual followup so the
    # user can re-run `brew postinstall` after granting the permission.
    - name: Install screenorganizer (postinstall failure tolerated)
      ansible.builtin.shell: |
        if brew list --formula seethruhead/tap/screenorganizer >/dev/null 2>&1; then
          echo already_installed
        else
          brew install seethruhead/tap/screenorganizer 2>&1 || echo postinstall_warning
        fi
      register: screenorganizer_install
      changed_when: "'already_installed' not in screenorganizer_install.stdout"

    - name: Check if Screen Organizer.app is deployed to /Applications
      ansible.builtin.stat:
        path: /Applications/Screen Organizer.app
      register: screenorganizer_app_stat

    - name: Queue manual followup for Screen Organizer if .app not deployed
      ansible.builtin.lineinfile:
        path: /tmp/bootstrap-followups.txt
        create: yes
        mode: "0644"
        line: "brew postinstall seethruhead/tap/screenorganizer    # deploys Screen Organizer.app to /Applications. First grant kitty App Management permission in System Settings → Privacy & Security."
      when: not screenorganizer_app_stat.stat.exists

    # --- Homebrew casks ---
    - name: Install homebrew casks
      community.general.homebrew_cask:
        name: "{{ homebrew_casks }}"
        state: present
        install_options: adopt

    # --- macOS defaults ---
    - name: Set macOS defaults
      community.general.osx_defaults:
        domain: "{{ item.domain }}"
        key: "{{ item.key }}"
        type: "{{ item.type }}"
        value: "{{ item.value }}"
      loop: "{{ macos_defaults }}"
      loop_control:
        label: "{{ item.domain }} {{ item.key }}"

    - name: Import keyboard shortcuts (Mission Control, Spotlight, etc)
      ansible.builtin.shell: defaults import com.apple.symbolichotkeys ~/.config/yadm/symbolichotkeys.plist
      changed_when: false

    - name: Quit Amethyst before importing its plist
      ansible.builtin.command: osascript -e 'tell application "Amethyst" to quit'
      changed_when: false
      ignore_errors: true

    - name: Import Amethyst keybindings + layouts + margins
      ansible.builtin.shell: |
        defaults import com.amethyst.Amethyst ~/.config/yadm/amethyst.plist
        killall cfprefsd 2>/dev/null || true
      changed_when: false

    - name: Relaunch Amethyst
      ansible.builtin.command: open -a Amethyst
      changed_when: false
      ignore_errors: true

    # --- Default browser ---
    - name: Set Chrome as default browser
      ansible.builtin.shell: |
        defaultbrowser | grep -q '\* chrome' || defaultbrowser chrome
      register: default_browser_result
      changed_when: "'chrome' not in default_browser_result.stdout or '* chrome' not in default_browser_result.stdout"

    # --- Mac App Store apps ---
    - name: Install Mac App Store apps
      ansible.builtin.shell: "mas list 2>/dev/null | grep -q '^{{ item.id }} ' || mas install {{ item.id }}"
      loop: "{{ mas_apps }}"
      loop_control:
        label: "{{ item.name }} ({{ item.id }})"
      register: mas_result
      changed_when: "'Installed' in mas_result.stdout or 'Downloaded' in mas_result.stdout"
      ignore_errors: true

    # --- Dock pinned apps ---
    - name: Check current dock apps
      ansible.builtin.shell: "dockutil --list | awk '{print $2}'"
      register: current_dock
      changed_when: false

    - name: Reset dock to desired pinned apps
      ansible.builtin.shell: |
        set -e
        dockutil --remove all --no-restart
        {% for app in dock_apps %}
        dockutil --add "{{ app }}" --no-restart
        {% endfor %}
      when: current_dock.stdout_lines | sort != (dock_apps | map('basename') | map('regex_replace', '\\.app$', '') | list | sort)

    - name: Create Screenshots directory
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/Screenshots"
        state: directory

    - name: Restart Dock
      ansible.builtin.command: killall Dock
      changed_when: false
      failed_when: false

    - name: Restart Finder
      ansible.builtin.command: killall Finder
      changed_when: false
      failed_when: false

    # --- yadm pre-commit hook (gitleaks) ---
    - name: Install gitleaks pre-commit hook for yadm
      ansible.builtin.copy:
        dest: "{{ lookup('pipe', 'yadm introspect repo') }}/hooks/pre-commit"
        mode: "0755"
        content: |
          #!/bin/bash
          if command -v gitleaks &>/dev/null; then
            gitleaks git --staged --no-banner "$(yadm introspect repo)"
          fi

    # --- Powerlevel10k ---
    - name: Clone powerlevel10k
      ansible.builtin.git:
        repo: https://github.com/romkatv/powerlevel10k.git
        dest: "{{ lookup('env', 'HOME') }}/powerlevel10k"
        depth: 1
        update: false

    # --- tmux plugin manager ---
    - name: Clone tpm
      ansible.builtin.git:
        repo: https://github.com/tmux-plugins/tpm.git
        dest: "{{ lookup('env', 'HOME') }}/.config/tmux/plugins/tpm"
        depth: 1
        update: false

    - name: Clone tpm (legacy path)
      ansible.builtin.git:
        repo: https://github.com/tmux-plugins/tpm.git
        dest: "{{ lookup('env', 'HOME') }}/.tmux/plugins/tpm"
        depth: 1
        update: false

    - name: Install tmux plugins
      ansible.builtin.shell: "~/.config/tmux/plugins/tpm/bin/install_plugins || true"
      args:
        creates: "{{ lookup('env', 'HOME') }}/.config/tmux/plugins/tmux-sensible"

    # --- Licenses ---
    - name: Deploy BetterTouchTool license
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.config/licenses/bettertouchtool.bttlicense"
        dest: "{{ lookup('env', 'HOME') }}/Library/Application Support/BetterTouchTool/bettertouchtool.bttlicense"
      ignore_errors: true

    - name: Deploy SoundSource presets
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.config/licenses/soundsource-presets.plist"
        dest: "{{ lookup('env', 'HOME') }}/Library/Application Support/SoundSource/CustomPresets.plist"
      ignore_errors: true

    - name: Deploy SoundSource sources
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.config/licenses/soundsource-sources.plist"
        dest: "{{ lookup('env', 'HOME') }}/Library/Application Support/SoundSource/Sources.plist"
      ignore_errors: true

    - name: Import SoundSource preferences (includes license)
      ansible.builtin.shell: defaults import com.rogueamoeba.soundsource ~/.config/licenses/soundsource.plist
      changed_when: false
      ignore_errors: true

    # --- Pi extensions ---
    - name: Find pi extensions with package.json
      ansible.builtin.find:
        paths: "{{ lookup('env', 'HOME') }}/.pi/agent/extensions"
        patterns: "package.json"
        recurse: true
        depth: 2
      register: pi_extensions

    - name: Install pi extension deps
      community.general.npm:
        path: "{{ item.path | dirname }}"
      loop: "{{ pi_extensions.files }}"
      loop_control:
        label: "{{ item.path | dirname | basename }}"
