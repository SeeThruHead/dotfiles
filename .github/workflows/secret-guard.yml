name: Secret Guard Tests

on:
  push:
    paths:
      - '.pi/agent/extensions/secret-guard/**'
      - '.github/workflows/secret-guard.yml'
  pull_request:
    paths:
      - '.pi/agent/extensions/secret-guard/**'
      - '.github/workflows/secret-guard.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run secret-guard tests
        run: |
          cd .pi/agent/extensions/secret-guard
          bash test/run.sh
